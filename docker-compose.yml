services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    container_name: ai-med-backend
    restart: unless-stopped

    env_file:
      - ./backend/.env

    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ai_med?sslmode=disable

    ports:
      - "3000:3000"

    volumes:
      - ./backend:/app
      - /app/node_modules

    depends_on:
      - postgres

    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 5

    networks:
      - ai-med-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    container_name: ai-med-frontend
    restart: unless-stopped

    environment:
      NODE_ENV: development
      VITE_API_TARGET: http://backend:3000
      CHOKIDAR_USEPOLLING: "true"

    ports:
      - "5173:5173"

    volumes:
      - ./frontend:/app
      - /app/node_modules

    depends_on:
      - backend

    networks:
      - ai-med-network

  postgres:
    image: postgres:16-alpine
    container_name: ai-med-postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_med

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    networks:
      - ai-med-network

volumes:
  postgres_data:

networks:
  ai-med-network:
    driver: bridge
