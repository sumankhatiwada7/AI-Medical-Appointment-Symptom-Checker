version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-med-backend
    restart: unless-stopped

    env_file:
      - ./backend/.env

    environment:
      NODE_ENV: production
      PORT: 3000

    ports:
      - "3000:3000"

    depends_on:
      - postgres

    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 5

    networks:
      - ai-med-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai-med-frontend
    restart: unless-stopped

    environment:
      NODE_ENV: development
      VITE_API_TARGET: http://backend:3000

    ports:
      - "5173:5173"

    depends_on:
      - backend
    
    develop:
      watch:
        - path: ./frontend/src
          action: rebuild

    networks:
      - ai-med-network

  postgres:
    image: postgres:16-alpine
    container_name: ai-med-postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_med

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    networks:
      - ai-med-network

volumes:
  postgres_data:

networks:
  ai-med-network:
    driver: bridge
