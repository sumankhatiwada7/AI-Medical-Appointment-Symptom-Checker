services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-med-backend
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    environment:
      FRONTEND_URL: http://localhost:5173
      PORT: 3000
      TS_NODE_TRANSPILE_ONLY: "true"
    # Use Dockerfile CMD which runs prisma generate, builds and starts the compiled app
    volumes:
      - ./backend:/app
      - /app/node_modules
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai-med-frontend
    ports:
      - "5173:5173"
    environment:
      CHOKIDAR_USEPOLLING: "true"
    command: npm run dev -- --host 0.0.0.0 --port 5173
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped
